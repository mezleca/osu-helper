<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="scrollbar.css">
</head>
<body>
    <div class="container">
        <div class="main">
            <span id="title">osu-reader</span>

            <label for="aaa" id="dir_label">
                select directory
            </label>

            <button class="dir" style="cursor: pointer;">...</button>

            <label for="ccc">method</label>
            <select name="ccc" id="type">
              
                <option value="display" selected>
                  display all maps
                </option>
                
                <option value="missing">
                  get missing maps
                </option>
                
            </select>

            <button id="go">go</button>

            <div class="tooltip">( disclaimer )
                <span class="tooltiptext">this app is only available in some browsers, make sure your browser supports directory selection</span>
            </div>
        </div>
    </div>
    <script type="module" src="./app.js"></script>
</body>
</html>
